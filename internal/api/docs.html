<!doctype html>
<html lang="en">
<head>
    <title>Know API Reference</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
    <div id="app"></div>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference@1.49.1"></script>
    <script>
        Scalar.createApiReference('#app', {
            url: '/api/v1/openapi.yaml',
            darkMode: true,
            forceDarkModeState: 'dark',
            authentication: {
                preferredSecurityScheme: 'BearerAuth'
            },
            persistAuth: true,
            defaultOpenAllTags: false,
            defaultOpenFirstTag: true,
            defaultHttpClient: { targetKey: 'shell', clientKey: 'curl' },
            hiddenClients: ['c', 'clojure', 'kotlin', 'objc', 'ocaml', 'powershell', 'r', 'swift'],
            searchHotKey: 'k',
            documentDownloadType: 'yaml',
            metaData: {
                title: 'Know API Reference',
                description: 'REST API for the Know knowledge management server'
            }
        })
    </script>
</body>
</html>
