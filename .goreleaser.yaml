version: 2

before:
  hooks:
    - go mod tidy
    - mkdir -p completions
    - sh -c "go run ./cmd/know completion bash > completions/know.bash"
    - sh -c "go run ./cmd/know completion zsh > completions/_know"
    - sh -c "go run ./cmd/know completion fish > completions/know.fish"
    - sh -c "test -s completions/know.bash && test -s completions/_know && test -s completions/know.fish"

builds:
  - id: know
    main: ./cmd/know
    binary: know
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - completions/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  groups:
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: "Documentation"
      regexp: '^.*?docs(\(.+\))?\!?:.+$'
      order: 2
    - title: "Other"
      order: 999
  filters:
    exclude:
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: raphi011
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/raphi011/know"
    description: "Knowledge management CLI with AI-powered search"
    license: "MIT"
    extra_install: |
      bash_completion.install "completions/know.bash" => "know"
      zsh_completion.install "completions/_know"
      fish_completion.install "completions/know.fish"
    service: |
      run [opt_bin/"know", "serve"]
      keep_alive true
      log_path var/"log/know.log"
      error_log_path var/"log/know.log"
