# Prod-like local stack: persistent SurrealDB + Bedrock via Teleport proxy.
# No bootstrap service — run `just prod-bootstrap` separately to init DB.
#
# Usage:
#   source bedrock-setup.fish   # start proxy, write .env
#   just prod-bootstrap          # init DB (first time only)
#   just prod                    # start full stack
services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0.2
    container_name: knowhow-surrealdb-prod
    command: start --user root --pass root surrealkv:/data/knowhow.db
    ports:
      - "5002:8000"
    volumes:
      - ~/knowhow-data/surreal:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/surreal", "is-ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  knowhow-server:
    build: .
    container_name: knowhow-server-prod
    ports:
      - "5001:8484"
    env_file: .env
    environment:
      SURREALDB_URL: ws://surrealdb:8000/rpc
      SURREALDB_NAMESPACE: knowledge
      SURREALDB_DATABASE: graph
      SURREALDB_USER: root
      SURREALDB_PASS: root
      SURREALDB_AUTH_LEVEL: root
      KNOWHOW_SERVER_PORT: "8484"
      KNOWHOW_NO_AUTH: "true"
      # Point HTTPS_PROXY at the host Teleport proxy
      HTTPS_PROXY: http://host.docker.internal:${BEDROCK_PROXY_PORT:-9876}
    volumes:
      - ~/.tsh:${HOME}/.tsh:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      surrealdb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8484/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build: ./web
    container_name: knowhow-web-prod
    ports:
      - "5000:3000"
    environment:
      AUTH_DISABLED: "true"
      BACKEND_URL: http://knowhow-server:8484
      SESSION_SECRET: prod-local-no-auth-not-used
      NEXT_PHASE: ""
    depends_on:
      knowhow-server:
        condition: service_healthy
    restart: unless-stopped
