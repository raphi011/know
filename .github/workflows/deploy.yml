name: Deploy — Build & Push to Zot

on:
  push:
    branches: [main]
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "Dockerfile"
      - "helm/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: zot.manx-turtle.ts.net
  BACKEND_IMAGE: know-server

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
            helm:
              - 'helm/**'

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.helm == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          args: --accept-dns=false

      - name: Add Zot registry to /etc/hosts
        run: |
          ZOT_IP=$(tailscale ip -4 zot)
          echo "$ZOT_IP ${{ env.REGISTRY }}" | sudo tee -a /etc/hosts

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^appVersion' helm/know/Chart.yaml | awk '{print $2}' | tr -d '"')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to extract appVersion from Chart.yaml"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }} -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest .

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ steps.version.outputs.version }}
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

  push-helm:
    needs: changes
    if: needs.changes.outputs.helm == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          args: --accept-dns=false

      - name: Add Zot registry to /etc/hosts
        run: |
          ZOT_IP=$(tailscale ip -4 zot)
          echo "$ZOT_IP ${{ env.REGISTRY }}" | sudo tee -a /etc/hosts

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Package and push Helm chart
        run: |
          helm package helm/know/
          helm push know-*.tgz oci://${{ env.REGISTRY }}
