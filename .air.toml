# Air configuration for knowhow live-reload
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
# Build command - must use -buildvcs=false (git subdir issue)
cmd = "go build -buildvcs=false -o ./bin/knowhow ./cmd/knowhow"
# Binary to run (serve subcommand starts the server)
bin = "./bin/knowhow serve"
# Watch these file extensions
include_ext = ["go", "toml", "graphqls"]
# Don't watch .env — it changes on every bedrock-setup and causes port-bind races
include_file = []
# Exclude directories
exclude_dir = ["bin", "tmp", "vendor", ".git", "web", "ios"]
# Exclude generated files to avoid rebuild loops
exclude_regex = ["_test\\.go$"]
# Wait 10 seconds after last change before rebuilding
delay = 20000
# Stop old binary on build error
stop_on_error = true
# Send interrupt before kill for graceful shutdown
send_interrupt = true
# Time to wait after interrupt before kill (in nanoseconds, 5s)
kill_delay = 5000000000
# Log build info
log = "build-errors.log"

[log]
# Show timestamps
time = true
# Main process log (shows rebuild triggers)
main_only = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
# Clean tmp dir on exit
clean_on_exit = true
