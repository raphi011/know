# Local no-auth stack for personal/Docker use.
# Usage: just local-up
services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0.2
    command: start --user root --pass root surrealkv:/data/knowhow.db
    ports:
      - "8000:8000"
    volumes:
      - ./data/surreal:/data
    healthcheck:
      test: ["CMD", "/surreal", "is-ready"]
      interval: 5s
      timeout: 3s
      retries: 10

  bootstrap:
    build: .
    entrypoint: ["/usr/local/bin/bootstrap"]
    environment:
      SURREALDB_URL: ws://surrealdb:8000/rpc
      KNOWHOW_NO_AUTH: "true"
    restart: "no"
    depends_on:
      surrealdb:
        condition: service_healthy

  knowhow-server:
    build: .
    ports:
      - "8484:8484"
    environment:
      SURREALDB_URL: ws://surrealdb:8000/rpc
      KNOWHOW_NO_AUTH: "true"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8484/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      AUTH_DISABLED: "true"
      BACKEND_URL: http://knowhow-server:8484
      # Required by env validation but unused in no-auth mode
      SESSION_SECRET: local-no-auth-not-used
      # Ensure env validation runs at runtime (empty disables build-phase skip)
      NEXT_PHASE: ""
    depends_on:
      knowhow-server:
        condition: service_healthy
