# gqlgen configuration for v2
schema:
  - internal/graph/schema.graphqls

exec:
  filename: internal/graph/generated.go
  package: graph

model:
  filename: internal/graph/model_gen.go
  package: graph

resolver:
  layout: follow-schema
  dir: internal/graph
  package: graph
  filename_template: "{name}.resolvers.go"

models:
  ID:
    model: github.com/99designs/gqlgen/graphql.ID
  DateTime:
    model: github.com/99designs/gqlgen/graphql.Time
  JSON:
    model: github.com/99designs/gqlgen/graphql.Map
  Vault:
    model: github.com/raphaelgruber/memcp-go/internal/graph.Vault
  Document:
    model: github.com/raphaelgruber/memcp-go/internal/graph.Document
  Folder:
    model: github.com/raphaelgruber/memcp-go/internal/graph.Folder
  WikiLink:
    model: github.com/raphaelgruber/memcp-go/internal/graph.WikiLink
  DocRelation:
    model: github.com/raphaelgruber/memcp-go/internal/graph.DocRelation
  Template:
    model: github.com/raphaelgruber/memcp-go/internal/graph.Template
  SearchResult:
    model: github.com/raphaelgruber/memcp-go/internal/graph.SearchResult
  ChunkMatch:
    model: github.com/raphaelgruber/memcp-go/internal/graph.ChunkMatch
  User:
    model: github.com/raphaelgruber/memcp-go/internal/graph.User
  Me:
    model: github.com/raphaelgruber/memcp-go/internal/graph.Me
  ScrapeResult:
    model: github.com/raphaelgruber/memcp-go/internal/graph.ScrapeResult
  VaultInput:
    model: github.com/raphaelgruber/memcp-go/internal/graph.VaultInput
  SearchInput:
    model: github.com/raphaelgruber/memcp-go/internal/graph.SearchInput
  FileInput:
    model: github.com/raphaelgruber/memcp-go/internal/graph.FileInput
  RelationInput:
    model: github.com/raphaelgruber/memcp-go/internal/graph.RelationInput
  TemplateInput:
    model: github.com/raphaelgruber/memcp-go/internal/graph.TemplateInput
  QueryBlock:
    model: github.com/raphaelgruber/memcp-go/internal/graph.QueryBlock
  QueryResult:
    model: github.com/raphaelgruber/memcp-go/internal/graph.QueryResult
  QueryFormat:
    model: github.com/raphaelgruber/memcp-go/internal/graph.QueryFormat
