# Default values for know

replicaCount: 1
revisionHistoryLimit: 3

image:
  repository: know
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Environment mode ("development" or "production")
# Production mode blocks KNOW_NO_AUTH and warns about NFS
environment: "production"

# Auth settings
# Maximum token lifetime in days (0 = no limit)
tokenMaxLifetimeDays: 90

# SurrealDB connection settings
surrealdb:
  url: "ws://surrealdb:8000/rpc"
  namespace: "knowledge"
  database: "graph"
  user: ""       # required — set via values or existingSecret
  password: ""   # required — set via values or existingSecret
  # Authentication level: "root" or "database"
  authLevel: "root"
  # Use existing secret for credentials (optional)
  # existingSecret: "surrealdb-credentials"
  # existingSecretUserKey: "user"
  # existingSecretPasswordKey: "password"

# Logging configuration
logging:
  level: ""          # DEBUG | INFO | WARN | ERROR (default: INFO)
  file: ""           # optional JSON log file path (default: stderr only)

# LLM provider configuration
llm:
  provider: ""       # none | ollama | openai | anthropic | bedrock | googleai
  model: ""          # e.g. claude-sonnet-4-20250514, gemini-2.5-flash
  contextWindow: ""  # override context window size in tokens (default: use registry)

# Embedding provider configuration
embedding:
  provider: ""       # none | ollama | openai | anthropic | bedrock | googleai
  model: ""          # e.g. gemini-embedding-001, voyage-3-large, text-embedding-3-small
  dimension: ""      # e.g. 768, 1024
  maxInputChars: ""  # max chars per embedding API call (default: no limit)

# Speech-to-text (transcription) configuration
stt:
  provider: ""       # none | openai
  model: ""          # e.g. gpt-4o-transcribe (default), whisper-1
  baseUrl: ""        # custom base URL for STT API (e.g. http://whisper:8080/v1)
  audioSegmentSeconds: ""  # max audio segment duration (default: 60, max 80 for Gemini)

# Multimodal embedding configuration
multimodalEmbedding:
  provider: ""       # none | googleai
  model: ""          # e.g. multimodalembedding@001

# Ollama settings (when using ollama provider)
ollama:
  host: ""           # e.g. http://ollama:11434

# PDF processing
pdf:
  textExtractorModel: ""  # model for PDF text extraction (default: gemini-2.0-flash)
  renderDpi: ""           # DPI for PDF rendering (default: 300)

# API docs (Scalar UI at /, OpenAPI spec at /api/v1/openapi.yaml)
docsEnabled: false  # disabled in production by default

# MCP (Model Context Protocol) endpoint
mcp:
  enabled: true  # set to false to disable MCP endpoint at /mcp

# Protocol port — separate port for WebDAV + MCP
protocol:
  enabled: true
  port: "4002"
  # protocolBaseURL: "" # Public URL for protocol port (required for OAuth in production)

# SSH/SFTP server
ssh:
  enabled: false
  port: "2222"
  hostKey: ""  # path to SSH host key; auto-generated if not set

# NFS server
nfs:
  enabled: false
  port: "2049"

# Prometheus metrics
metrics:
  port: ""  # port for /metrics endpoint (default: disabled)

# Pipeline worker
pipeline:
  workerInterval: ""  # seconds between worker ticks (default: 5)
  workerBatch: ""     # max jobs per tick (default: 10)

# Chunking
chunking:
  threshold: ""   # only chunk if content exceeds this length (default: 6000)
  targetSize: ""  # ideal chunk size in chars (default: 3000)
  maxSize: ""     # maximum chunk size in chars (default: 4000)

# Versioning
versioning:
  coalesceMinutes: ""  # minutes between version snapshots (default: 10)
  retention: ""        # max versions per document (default: 50)

# TLS
tls:
  skipVerify: false  # skip TLS verification for Bedrock proxy

# OIDC authentication
oidc:
  enabled: false
  providerType: "oidc"  # "oidc" or "github"
  issuerURL: ""  # required for "oidc" provider type, unused for "github"
  clientID: ""
  # clientSecret is stored in the secret
  clientSecret: ""
  redirectURL: ""
  providerName: ""  # explicit provider name for DB key (default: derived from issuer URL)
  selfSignupEnabled: false

# Rate limiting (0 = disabled)
rateLimit:
  authRPS: 5         # requests/sec for /auth/* endpoints
  authBurst: 10
  globalRPS: 100     # requests/sec global per-IP
  globalBurst: 200

# Proxy trust (default false; set true in K8s where the server is behind an ingress proxy)
trustXForwardedFor: true

# API keys (set via existingSecret or directly)
# Prefer using existingSecret for production
apiKeys:
  # Use an existing secret containing API keys
  # existingSecret: "know-api-keys"
  openaiApiKey: ""
  anthropicApiKey: ""
  googleAiApiKey: ""
  tavilyApiKey: ""
  apifyToken: ""    # Apify API token (enables YouTube transcript tool)
  jinaApiKey: ""    # Jina Reader API key for web clipping

# AWS Bedrock settings
bedrock:
  embedModelProvider: ""  # e.g. amazon
  region: ""              # e.g. eu-central-1

# Persistent storage for blobs and data
persistence:
  enabled: true
  size: 10Gi
  accessMode: ReadWriteOnce
  storageClass: ""

# Blob store configuration
blob:
  store: fs
  dir: /data/blobs
  s3:
    bucket: ""
    prefix: blobs
    endpoint: ""
    region: us-east-1

# Extra environment variables (for any config not covered above)
extraEnv: []
  # - name: KNOW_INGEST_CONCURRENCY
  #   value: "4"

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8484

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: know.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: know-tls
  #    hosts:
  #      - know.local

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}

tolerations: []

affinity: {}

# NetworkPolicy configuration
networkPolicy:
  enabled: true
  # Additional ingress rules for the backend pod
  # Example: allow traffic from a reverse proxy namespace
  # additionalIngress:
  #   - from:
  #       - namespaceSelector:
  #           matchLabels:
  #             kubernetes.io/metadata.name: my-proxy
  #     ports:
  #       - protocol: TCP
  #         port: 8484
  additionalIngress: []
  # Additional egress rules for the backend pod
  # DNS and external HTTPS (443) egress are always included
  # Example: allow traffic to a database namespace
  # additionalEgress:
  #   - to:
  #       - namespaceSelector:
  #           matchLabels:
  #             kubernetes.io/metadata.name: my-database
  #     ports:
  #       - protocol: TCP
  #         port: 5432
  additionalEgress: []
