apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "know.fullname" . }}
  labels:
    {{- include "know.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "know.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "know.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "know.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8484
              protocol: TCP
            {{- if .Values.protocol.enabled }}
            - name: protocol
              containerPort: {{ .Values.protocol.port | default "4002" }}
              protocol: TCP
            {{- end }}
            {{- if .Values.ssh.enabled }}
            - name: ssh
              containerPort: {{ .Values.ssh.port | default "2222" }}
              protocol: TCP
            {{- end }}
            {{- if .Values.nfs.enabled }}
            - name: nfs
              containerPort: {{ .Values.nfs.port | default "2049" }}
              protocol: TCP
            {{- end }}
            {{- if .Values.metrics.port }}
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
            {{- end }}
          env:
            - name: KNOW_ENVIRONMENT
              value: {{ .Values.environment | default "production" | quote }}
            {{- if .Values.oidc.enabled }}
            - name: KNOW_OIDC_ENABLED
              value: "true"
            - name: KNOW_OIDC_ISSUER_URL
              value: {{ .Values.oidc.issuerURL | quote }}
            - name: KNOW_OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientID | quote }}
            - name: KNOW_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-oidc
                  key: client-secret
            - name: KNOW_OIDC_REDIRECT_URL
              value: {{ .Values.oidc.redirectURL | quote }}
            {{- if .Values.oidc.providerName }}
            - name: KNOW_OIDC_PROVIDER_NAME
              value: {{ .Values.oidc.providerName | quote }}
            {{- end }}
            - name: KNOW_SELF_SIGNUP_ENABLED
              value: {{ .Values.oidc.selfSignupEnabled | quote }}
            {{- end }}
            - name: KNOW_TOKEN_MAX_LIFETIME_DAYS
              value: {{ .Values.tokenMaxLifetimeDays | default 90 | quote }}
            - name: KNOW_TRUST_X_FORWARDED_FOR
              value: {{ .Values.trustXForwardedFor | default true | quote }}
            - name: KNOW_RATE_LIMIT_AUTH_RPS
              value: {{ .Values.rateLimit.authRPS | default 5 | quote }}
            - name: KNOW_RATE_LIMIT_AUTH_BURST
              value: {{ .Values.rateLimit.authBurst | default 10 | quote }}
            - name: KNOW_RATE_LIMIT_GLOBAL_RPS
              value: {{ .Values.rateLimit.globalRPS | default 100 | quote }}
            - name: KNOW_RATE_LIMIT_GLOBAL_BURST
              value: {{ .Values.rateLimit.globalBurst | default 200 | quote }}
            - name: KNOW_SERVER_PORT
              value: "8484"
            # Logging
            {{- if .Values.logging.level }}
            - name: KNOW_LOG_LEVEL
              value: {{ .Values.logging.level | quote }}
            {{- end }}
            {{- if .Values.logging.file }}
            - name: KNOW_LOG_FILE
              value: {{ .Values.logging.file | quote }}
            {{- end }}
            # SurrealDB connection
            - name: SURREALDB_URL
              value: {{ .Values.surrealdb.url | quote }}
            - name: SURREALDB_NAMESPACE
              value: {{ .Values.surrealdb.namespace | quote }}
            - name: SURREALDB_DATABASE
              value: {{ .Values.surrealdb.database | quote }}
            - name: SURREALDB_AUTH_LEVEL
              value: {{ .Values.surrealdb.authLevel | quote }}
            {{- if .Values.surrealdb.existingSecret }}
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.surrealdb.existingSecret }}
                  key: {{ .Values.surrealdb.existingSecretUserKey | default "user" }}
            - name: SURREALDB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.surrealdb.existingSecret }}
                  key: {{ .Values.surrealdb.existingSecretPasswordKey | default "password" }}
            {{- else }}
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-surrealdb
                  key: user
            - name: SURREALDB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-surrealdb
                  key: password
            {{- end }}
            # LLM provider
            {{- if .Values.llm.provider }}
            - name: KNOW_LLM_PROVIDER
              value: {{ .Values.llm.provider | quote }}
            {{- end }}
            {{- if .Values.llm.model }}
            - name: KNOW_LLM_MODEL
              value: {{ .Values.llm.model | quote }}
            {{- end }}
            {{- if .Values.llm.contextWindow }}
            - name: KNOW_LLM_CONTEXT_WINDOW
              value: {{ .Values.llm.contextWindow | quote }}
            {{- end }}
            # Embedding provider
            {{- if .Values.embedding.provider }}
            - name: KNOW_EMBED_PROVIDER
              value: {{ .Values.embedding.provider | quote }}
            {{- end }}
            {{- if .Values.embedding.model }}
            - name: KNOW_EMBED_MODEL
              value: {{ .Values.embedding.model | quote }}
            {{- end }}
            {{- if .Values.embedding.dimension }}
            - name: KNOW_EMBED_DIMENSION
              value: {{ .Values.embedding.dimension | quote }}
            {{- end }}
            {{- if .Values.embedding.maxInputChars }}
            - name: KNOW_EMBED_MAX_INPUT_CHARS
              value: {{ .Values.embedding.maxInputChars | quote }}
            {{- end }}
            # Speech-to-text
            {{- if .Values.stt.provider }}
            - name: KNOW_STT_PROVIDER
              value: {{ .Values.stt.provider | quote }}
            {{- end }}
            {{- if .Values.stt.model }}
            - name: KNOW_STT_MODEL
              value: {{ .Values.stt.model | quote }}
            {{- end }}
            {{- if .Values.stt.baseUrl }}
            - name: KNOW_STT_BASE_URL
              value: {{ .Values.stt.baseUrl | quote }}
            {{- end }}
            {{- if .Values.stt.audioSegmentSeconds }}
            - name: KNOW_AUDIO_SEGMENT_SECONDS
              value: {{ .Values.stt.audioSegmentSeconds | quote }}
            {{- end }}
            # Multimodal embedding
            {{- if .Values.multimodalEmbedding.provider }}
            - name: KNOW_MULTIMODAL_EMBED_PROVIDER
              value: {{ .Values.multimodalEmbedding.provider | quote }}
            {{- end }}
            {{- if .Values.multimodalEmbedding.model }}
            - name: KNOW_MULTIMODAL_EMBED_MODEL
              value: {{ .Values.multimodalEmbedding.model | quote }}
            {{- end }}
            # Ollama
            {{- if .Values.ollama.host }}
            - name: OLLAMA_HOST
              value: {{ .Values.ollama.host | quote }}
            {{- end }}
            # PDF processing
            {{- if .Values.pdf.textExtractorModel }}
            - name: KNOW_TEXT_EXTRACTOR_MODEL
              value: {{ .Values.pdf.textExtractorModel | quote }}
            {{- end }}
            {{- if .Values.pdf.renderDpi }}
            - name: KNOW_PDF_RENDER_DPI
              value: {{ .Values.pdf.renderDpi | quote }}
            {{- end }}
            # MCP
            - name: KNOW_MCP_ENABLED
              value: {{ .Values.mcp.enabled | quote }}
            # Protocol port (WebDAV + MCP)
            {{- if .Values.protocol.enabled }}
            - name: KNOW_PROTOCOL_PORT
              value: {{ .Values.protocol.port | default "4002" | quote }}
            {{- end }}
            # SSH/SFTP server
            {{- if .Values.ssh.enabled }}
            - name: KNOW_SSH_ENABLED
              value: "true"
            - name: KNOW_SSH_PORT
              value: {{ .Values.ssh.port | default "2222" | quote }}
            {{- if .Values.ssh.hostKey }}
            - name: KNOW_SSH_HOST_KEY
              value: {{ .Values.ssh.hostKey | quote }}
            {{- end }}
            {{- end }}
            # NFS server
            {{- if .Values.nfs.enabled }}
            - name: KNOW_NFS_ENABLED
              value: "true"
            - name: KNOW_NFS_PORT
              value: {{ .Values.nfs.port | default "2049" | quote }}
            {{- end }}
            # Metrics
            {{- if .Values.metrics.port }}
            - name: KNOW_METRICS_PORT
              value: {{ .Values.metrics.port | quote }}
            {{- end }}
            # Pipeline worker
            {{- if .Values.pipeline.workerInterval }}
            - name: KNOW_PIPELINE_WORKER_INTERVAL
              value: {{ .Values.pipeline.workerInterval | quote }}
            {{- end }}
            {{- if .Values.pipeline.workerBatch }}
            - name: KNOW_PIPELINE_WORKER_BATCH
              value: {{ .Values.pipeline.workerBatch | quote }}
            {{- end }}
            # Chunking
            {{- if .Values.chunking.threshold }}
            - name: KNOW_CHUNK_THRESHOLD
              value: {{ .Values.chunking.threshold | quote }}
            {{- end }}
            {{- if .Values.chunking.targetSize }}
            - name: KNOW_CHUNK_TARGET_SIZE
              value: {{ .Values.chunking.targetSize | quote }}
            {{- end }}
            {{- if .Values.chunking.maxSize }}
            - name: KNOW_CHUNK_MAX_SIZE
              value: {{ .Values.chunking.maxSize | quote }}
            {{- end }}
            # Versioning
            {{- if .Values.versioning.coalesceMinutes }}
            - name: KNOW_VERSION_COALESCE_MINUTES
              value: {{ .Values.versioning.coalesceMinutes | quote }}
            {{- end }}
            {{- if .Values.versioning.retention }}
            - name: KNOW_VERSION_RETENTION
              value: {{ .Values.versioning.retention | quote }}
            {{- end }}
            # TLS
            {{- if .Values.tls.skipVerify }}
            - name: KNOW_TLS_SKIP_VERIFY
              value: "true"
            {{- end }}
            # API keys
            {{- if .Values.apiKeys.existingSecret }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: anthropic-api-key
                  optional: true
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: google-ai-api-key
                  optional: true
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: tavily-api-key
                  optional: true
            - name: KNOW_APIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: apify-token
                  optional: true
            - name: KNOW_JINA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: jina-api-key
                  optional: true
            {{- else }}
            {{- if .Values.apiKeys.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: openai-api-key
            {{- end }}
            {{- if .Values.apiKeys.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: anthropic-api-key
            {{- end }}
            {{- if .Values.apiKeys.googleAiApiKey }}
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: google-ai-api-key
            {{- end }}
            {{- if .Values.apiKeys.tavilyApiKey }}
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: tavily-api-key
            {{- end }}
            {{- if .Values.apiKeys.apifyToken }}
            - name: KNOW_APIFY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: apify-token
            {{- end }}
            {{- if .Values.apiKeys.jinaApiKey }}
            - name: KNOW_JINA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: jina-api-key
            {{- end }}
            {{- end }}
            # AWS Bedrock
            {{- if .Values.bedrock.embedModelProvider }}
            - name: KNOW_BEDROCK_EMBED_MODEL_PROVIDER
              value: {{ .Values.bedrock.embedModelProvider | quote }}
            {{- end }}
            {{- if .Values.bedrock.region }}
            - name: AWS_REGION
              value: {{ .Values.bedrock.region | quote }}
            {{- end }}
            # Blob store
            - name: KNOW_BLOB_STORE
              value: {{ .Values.blob.store | default "fs" | quote }}
            - name: KNOW_BLOB_DIR
              value: {{ .Values.blob.dir | default "/data/blobs" | quote }}
            {{- if eq (.Values.blob.store | default "fs") "s3" }}
            - name: KNOW_BLOB_S3_BUCKET
              value: {{ .Values.blob.s3.bucket | quote }}
            - name: KNOW_BLOB_S3_PREFIX
              value: {{ .Values.blob.s3.prefix | default "blobs" | quote }}
            {{- if .Values.blob.s3.endpoint }}
            - name: KNOW_BLOB_S3_ENDPOINT
              value: {{ .Values.blob.s3.endpoint | quote }}
            {{- end }}
            - name: KNOW_BLOB_S3_REGION
              value: {{ .Values.blob.s3.region | default "us-east-1" | quote }}
            {{- end }}
            # Extra environment variables
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "know.fullname" . }}-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
