apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "know.fullname" . }}
  labels:
    {{- include "know.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "know.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "know.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "know.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8484
              protocol: TCP
          env:
            - name: KNOW_SERVER_PORT
              value: "8484"
            # SurrealDB connection
            - name: SURREALDB_URL
              value: {{ .Values.surrealdb.url | quote }}
            - name: SURREALDB_NAMESPACE
              value: {{ .Values.surrealdb.namespace | quote }}
            - name: SURREALDB_DATABASE
              value: {{ .Values.surrealdb.database | quote }}
            - name: SURREALDB_AUTH_LEVEL
              value: {{ .Values.surrealdb.authLevel | quote }}
            {{- if .Values.surrealdb.existingSecret }}
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.surrealdb.existingSecret }}
                  key: {{ .Values.surrealdb.existingSecretUserKey | default "user" }}
            - name: SURREALDB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.surrealdb.existingSecret }}
                  key: {{ .Values.surrealdb.existingSecretPasswordKey | default "password" }}
            {{- else }}
            - name: SURREALDB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-surrealdb
                  key: user
            - name: SURREALDB_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-surrealdb
                  key: password
            {{- end }}
            # LLM provider
            {{- if .Values.llm.provider }}
            - name: KNOW_LLM_PROVIDER
              value: {{ .Values.llm.provider | quote }}
            {{- end }}
            {{- if .Values.llm.model }}
            - name: KNOW_LLM_MODEL
              value: {{ .Values.llm.model | quote }}
            {{- end }}
            # Embedding provider
            {{- if .Values.embedding.provider }}
            - name: KNOW_EMBED_PROVIDER
              value: {{ .Values.embedding.provider | quote }}
            {{- end }}
            {{- if .Values.embedding.model }}
            - name: KNOW_EMBED_MODEL
              value: {{ .Values.embedding.model | quote }}
            {{- end }}
            {{- if .Values.embedding.dimension }}
            - name: KNOW_EMBED_DIMENSION
              value: {{ .Values.embedding.dimension | quote }}
            {{- end }}
            # Ollama
            {{- if .Values.ollama.host }}
            - name: OLLAMA_HOST
              value: {{ .Values.ollama.host | quote }}
            {{- end }}
            # API keys
            {{- if .Values.apiKeys.existingSecret }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: anthropic-api-key
                  optional: true
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: google-ai-api-key
                  optional: true
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeys.existingSecret }}
                  key: tavily-api-key
                  optional: true
            {{- else }}
            {{- if .Values.apiKeys.openaiApiKey }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: openai-api-key
            {{- end }}
            {{- if .Values.apiKeys.anthropicApiKey }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: anthropic-api-key
            {{- end }}
            {{- if .Values.apiKeys.googleAiApiKey }}
            - name: GOOGLE_AI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: google-ai-api-key
            {{- end }}
            {{- if .Values.apiKeys.tavilyApiKey }}
            - name: TAVILY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "know.fullname" . }}-api-keys
                  key: tavily-api-key
            {{- end }}
            {{- end }}
            # AWS Bedrock
            {{- if .Values.bedrock.embedModelProvider }}
            - name: KNOW_BEDROCK_EMBED_MODEL_PROVIDER
              value: {{ .Values.bedrock.embedModelProvider | quote }}
            {{- end }}
            {{- if .Values.bedrock.region }}
            - name: AWS_REGION
              value: {{ .Values.bedrock.region | quote }}
            {{- end }}
            # Blob store
            - name: KNOW_BLOB_STORE
              value: {{ .Values.blob.store | default "fs" | quote }}
            - name: KNOW_BLOB_DIR
              value: {{ .Values.blob.dir | default "/data/blobs" | quote }}
            {{- if eq (.Values.blob.store | default "fs") "s3" }}
            - name: KNOW_BLOB_S3_BUCKET
              value: {{ .Values.blob.s3.bucket | quote }}
            - name: KNOW_BLOB_S3_PREFIX
              value: {{ .Values.blob.s3.prefix | default "blobs" | quote }}
            {{- if .Values.blob.s3.endpoint }}
            - name: KNOW_BLOB_S3_ENDPOINT
              value: {{ .Values.blob.s3.endpoint | quote }}
            {{- end }}
            - name: KNOW_BLOB_S3_REGION
              value: {{ .Values.blob.s3.region | default "us-east-1" | quote }}
            {{- end }}
            # Extra environment variables
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "know.fullname" . }}-data
        {{- else }}
        - name: data
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
