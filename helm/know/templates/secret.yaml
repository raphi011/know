{{- if not .Values.surrealdb.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "know.fullname" . }}-surrealdb
  labels:
    {{- include "know.labels" . | nindent 4 }}
type: Opaque
stringData:
  user: {{ .Values.surrealdb.user | quote }}
  password: {{ .Values.surrealdb.password | quote }}
{{- end }}
{{- if and (or .Values.apiKeys.openaiApiKey .Values.apiKeys.anthropicApiKey .Values.apiKeys.googleAiApiKey .Values.apiKeys.tavilyApiKey .Values.apiKeys.apifyToken .Values.apiKeys.jinaApiKey) (not .Values.apiKeys.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "know.fullname" . }}-api-keys
  labels:
    {{- include "know.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.apiKeys.openaiApiKey }}
  openai-api-key: {{ .Values.apiKeys.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.apiKeys.anthropicApiKey }}
  anthropic-api-key: {{ .Values.apiKeys.anthropicApiKey | quote }}
  {{- end }}
  {{- if .Values.apiKeys.googleAiApiKey }}
  google-ai-api-key: {{ .Values.apiKeys.googleAiApiKey | quote }}
  {{- end }}
  {{- if .Values.apiKeys.tavilyApiKey }}
  tavily-api-key: {{ .Values.apiKeys.tavilyApiKey | quote }}
  {{- end }}
  {{- if .Values.apiKeys.apifyToken }}
  apify-token: {{ .Values.apiKeys.apifyToken | quote }}
  {{- end }}
  {{- if .Values.apiKeys.jinaApiKey }}
  jina-api-key: {{ .Values.apiKeys.jinaApiKey | quote }}
  {{- end }}
{{- end }}
